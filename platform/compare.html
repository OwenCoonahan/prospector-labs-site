<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Projects — Glass Energy</title>
  <meta name="description" content="Side-by-side comparison of energy infrastructure projects. Compare scores, tax credits, capacity, developers, and more.">
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts/geist-sans/style.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <a href="/platform/" class="topbar-logo">Glass <span>Energy</span></a>
    <div class="topbar-nav">
      <a href="/platform/">Explorer</a>
      <a href="/platform/compare.html" class="active">Compare</a>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-primary btn-sm" id="add-project-btn" onclick="showAddModal()">+ Add Project</button>
      <button class="btn-icon" onclick="toggleTheme()">&#9684;</button>
    </div>
  </div>

  <div class="app" style="padding-top:24px">
    <h1 class="text-xl font-bold tracking-tight">Compare Projects</h1>
    <p class="text-secondary text-sm mt-2">Side-by-side comparison of <span id="compare-count">0</span> projects</p>

    <!-- Loading -->
    <div id="loading" class="loading-spinner" style="display:none"></div>

    <!-- Error -->
    <div id="error-state" class="error-state" style="display:none">
      <h3>Failed to load projects</h3>
      <p id="error-msg"></p>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" style="display:none">
      <h3>No projects selected</h3>
      <p>Add projects to compare them side-by-side.</p>
      <button class="btn btn-primary mt-4" onclick="showAddModal()">+ Add Project</button>
    </div>

    <!-- Comparison grid -->
    <div id="compare-container" class="mt-4" style="display:none">
      <div class="compare-grid" id="compare-grid"></div>
    </div>
  </div>

  <!-- Add project modal -->
  <div id="add-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center">
    <div class="card" style="width:520px;max-height:460px;overflow:hidden">
      <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span class="font-semibold">Add Project to Compare</span>
        <button class="btn-icon" onclick="hideAddModal()" style="width:24px;height:24px;font-size:0.9rem">&#10005;</button>
      </div>
      <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <input type="text" class="filter-input" style="width:100%" placeholder="Search by project name, ID, or developer..." id="add-search-input">
      </div>
      <div id="add-search-results" style="max-height:320px;overflow-y:auto;padding:4px 0">
        <div class="empty-state" style="padding:24px"><p class="text-secondary text-sm">Type to search projects</p></div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="utils.js"></script>
  <script>
    // ── State ──────────────────────────────────────────────────────────
    let compareData = []; // Array of { project, score }

    // ── Comparison rows config ────────────────────────────────────────
    const ROWS = [
      { label: 'Score',            key: 'score',           fmt: fmtScore,       best: 'high' },
      { label: 'Status',           key: 'status',          fmt: fmtStatus,      best: null   },
      { label: 'Capacity',         key: 'capacity_mw',     fmt: v => fmtMW(v),  best: null   },
      { label: 'Technology',       key: 'type',            fmt: fmtTech,        best: null   },
      { label: 'COD',              key: 'cod',             fmt: formatQuarter,  best: 'low'  },
      { label: 'Credit Type',      key: 'credit_type',     fmt: v => v || '\u2014', best: null },
      { label: 'Credit Rate',      key: 'credit_rate',     fmt: fmtCreditRate,  best: 'high' },
      { label: 'Credit Value',     key: 'credit_value',    fmt: fmtDollars,     best: 'high' },
      { label: 'Developer',        key: 'developer',       fmt: v => esc(v) || '\u2014', best: null },
      { label: 'Queue Time',       key: 'queue_years',     fmt: fmtQueueTime,   best: 'low'  },
      { label: 'Energy Community', key: 'ec',              fmt: fmtCheck,       best: null   },
      { label: 'Construction',     key: 'construction',    fmt: fmtConstruction, best: null  },
      { label: 'ISO / Region',     key: 'region',          fmt: v => esc(v) || '\u2014', best: null },
      { label: 'State',            key: 'state',           fmt: v => esc(v) || '\u2014', best: null },
    ];

    // ── Formatting helpers ────────────────────────────────────────────
    function fmtScore(v) {
      if (!v || v.total === undefined) return '\u2014';
      return `<span class="score-badge ${scoreClass(v.total)}">${v.total}</span> <span class="text-xs text-secondary">${v.grade || ''}</span>`;
    }
    function fmtStatus(v) {
      if (!v) return '\u2014';
      return `<span class="status-dot ${statusDotClass(v)}"></span>${statusLabel(v)}`;
    }
    function fmtTech(v) {
      if (!v) return '\u2014';
      return `<span class="badge ${techClass(v)}">${techLabel(v)}</span>`;
    }
    function fmtCreditRate(v) {
      if (v === null || v === undefined) return '\u2014';
      return v > 1 ? `$${v.toFixed(2)}/MWh` : `${(v * 100).toFixed(0)}%`;
    }
    function fmtQueueTime(v) {
      if (v === null) return '\u2014';
      return `${v} yr`;
    }
    function fmtCheck(v) {
      return v ? '<span class="check-yes">&#10003;</span> Yes' : '<span class="check-no">\u2014</span> No';
    }
    function fmtConstruction(v) {
      if (!v) return '\u2014';
      return `<span class="badge badge-amber">${esc(v)}</span>`;
    }

    // ── Extract comparable values ─────────────────────────────────────
    function extractValues(item) {
      const p = item.project;
      const s = item.score;
      return {
        score: s ? { total: s.total_score, grade: s.grade } : null,
        status: p.status,
        capacity_mw: p.capacity_mw,
        type: p.type,
        cod: p.cod,
        credit_type: p.recommended_credit ? p.recommended_credit.toUpperCase() : null,
        credit_rate: p.effective_credit_rate,
        credit_value: p.estimated_credit_value,
        developer: p.developer_canonical || p.developer,
        queue_years: queueYears(p.queue_date),
        ec: p.energy_community_eligible,
        construction: p.construction_stage,
        region: p.region,
        state: p.state,
      };
    }

    // ── Best/worst detection ──────────────────────────────────────────
    function getNumericValue(val, key) {
      if (key === 'score') return val && val.total != null ? val.total : null;
      if (typeof val === 'number') return val;
      return null;
    }

    function highlightBestWorst(values, higherIsBetter) {
      const nums = values.map(v => typeof v === 'number' ? v : null);
      const valid = nums.filter(n => n !== null);
      if (valid.length < 2) return values.map(() => '');
      const best = higherIsBetter ? Math.max(...valid) : Math.min(...valid);
      const worst = higherIsBetter ? Math.min(...valid) : Math.max(...valid);
      if (best === worst) return values.map(() => '');
      return nums.map(n => {
        if (n === null) return '';
        if (n === best) return 'best';
        if (n === worst && valid.length > 2) return 'worst';
        return '';
      });
    }

    // ── Render comparison grid ────────────────────────────────────────
    function renderComparison() {
      const n = compareData.length;
      document.getElementById('compare-count').textContent = n;

      if (n === 0) {
        document.getElementById('empty-state').style.display = '';
        document.getElementById('compare-container').style.display = 'none';
        return;
      }
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('compare-container').style.display = '';

      const allValues = compareData.map(extractValues);
      const colWidth = n <= 2 ? '1fr' : '1fr';
      const gridCols = `160px repeat(${n}, ${colWidth})`;

      let html = '';

      // Header row — project names
      html += `<div class="compare-row" style="display:grid;grid-template-columns:${gridCols}">`;
      html += `<div class="compare-cell header"></div>`;
      for (let i = 0; i < n; i++) {
        const p = compareData[i].project;
        html += `<div class="compare-cell" style="text-align:center;padding:14px 12px">
          <div class="font-semibold" style="font-size:0.88rem">${esc(p.name || p.queue_id || `Project ${p.id}`)}</div>
          <div class="text-sm text-secondary">${fmtMW(p.capacity_mw)} ${techLabel(p.type)}</div>
          <div class="text-xs text-secondary">${esc(p.region || '')}</div>
          <div class="mt-2 flex gap-2" style="justify-content:center">
            <a href="project.html?id=${p.id}" class="btn btn-ghost btn-sm">Detail</a>
            <button class="btn btn-ghost btn-sm" onclick="removeProject(${p.id})">Remove</button>
          </div>
        </div>`;
      }
      html += `</div>`;

      // Data rows
      for (const row of ROWS) {
        const vals = allValues.map(v => v[row.key]);
        const numVals = vals.map(v => getNumericValue(v, row.key));
        const highlights = row.best ? highlightBestWorst(numVals, row.best === 'high') : vals.map(() => '');

        html += `<div class="compare-row" style="display:grid;grid-template-columns:${gridCols}">`;
        html += `<div class="compare-cell header">${row.label}</div>`;
        for (let i = 0; i < n; i++) {
          const cls = highlights[i] ? ` ${highlights[i]}` : '';
          html += `<div class="compare-cell${cls}" style="text-align:center">${row.fmt(vals[i])}</div>`;
        }
        html += `</div>`;
      }

      document.getElementById('compare-grid').innerHTML = html;
    }

    // ── URL management ────────────────────────────────────────────────
    function getCurrentIds() {
      return (new URLSearchParams(window.location.search).get('ids') || '')
        .split(',').filter(Boolean).map(Number);
    }

    function updateCompareURL(ids) {
      const url = ids.length ? `compare.html?ids=${ids.join(',')}` : 'compare.html';
      window.history.replaceState({}, '', url);
    }

    async function addProject(id) {
      const ids = getCurrentIds();
      if (ids.length >= 4) { alert('Maximum 4 projects'); return; }
      if (ids.includes(id)) return;
      ids.push(id);
      updateCompareURL(ids);
      hideAddModal();
      await loadProjects(ids);
    }

    function removeProject(id) {
      const ids = getCurrentIds().filter(i => i !== id);
      compareData = compareData.filter(d => d.project.id !== id);
      updateCompareURL(ids);
      renderComparison();
    }

    // ── Add modal ─────────────────────────────────────────────────────
    function showAddModal() {
      const modal = document.getElementById('add-modal');
      modal.style.display = 'flex';
      const input = document.getElementById('add-search-input');
      input.value = '';
      input.focus();
      document.getElementById('add-search-results').innerHTML =
        '<div class="empty-state" style="padding:24px"><p class="text-secondary text-sm">Type to search projects</p></div>';
    }

    function hideAddModal() {
      document.getElementById('add-modal').style.display = 'none';
    }

    // Close modal on backdrop click
    document.getElementById('add-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('add-modal')) hideAddModal();
    });

    // Close modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideAddModal();
    });

    // Search input
    const searchInput = document.getElementById('add-search-input');
    searchInput.addEventListener('input', debounce(async () => {
      const q = searchInput.value.trim();
      const resultsEl = document.getElementById('add-search-results');
      if (q.length < 2) {
        resultsEl.innerHTML = '<div class="empty-state" style="padding:24px"><p class="text-secondary text-sm">Type to search projects</p></div>';
        return;
      }

      resultsEl.innerHTML = '<div class="loading-spinner" style="padding:24px"></div>';

      try {
        const data = await api.search(q, { per_page: 8 });
        const results = data.data || data.results || data;
        const currentIds = getCurrentIds();

        if (!results || results.length === 0) {
          resultsEl.innerHTML = '<div class="empty-state" style="padding:24px"><p class="text-secondary text-sm">No matching projects</p></div>';
          return;
        }

        let html = '';
        for (const p of results) {
          const already = currentIds.includes(p.id);
          html += `<div class="search-dropdown-item${already ? '' : ''}" ${already ? 'style="opacity:0.4"' : `onclick="addProject(${p.id})"`}>
            <div>
              <div class="name">${esc(p.name || p.queue_id || `Project ${p.id}`)}</div>
              <div class="meta">${fmtMW(p.capacity_mw)} ${techLabel(p.type)} &middot; ${esc(p.region || '')} &middot; ${esc(p.state || '')}</div>
            </div>
            <div>
              ${already ? '<span class="text-xs text-secondary">Added</span>' : '<span class="text-xs text-blue">+ Add</span>'}
            </div>
          </div>`;
        }
        resultsEl.innerHTML = html;
      } catch (err) {
        resultsEl.innerHTML = `<div class="error-state" style="padding:16px"><p class="text-sm">Search failed: ${esc(err.message)}</p></div>`;
      }
    }, 300));

    // ── Load projects ─────────────────────────────────────────────────
    async function loadProjects(ids) {
      if (ids.length === 0) {
        compareData = [];
        renderComparison();
        return;
      }

      document.getElementById('loading').style.display = '';
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('compare-container').style.display = 'none';
      document.getElementById('error-state').style.display = 'none';

      try {
        const results = await Promise.all(
          ids.flatMap(id => [api.project(id), api.score(id).catch(() => null)])
        );

        compareData = [];
        for (let i = 0; i < results.length; i += 2) {
          const proj = results[i].data || results[i];
          const score = results[i + 1] ? (results[i + 1].data || results[i + 1]) : null;
          compareData.push({ project: proj, score: score });
        }

        document.getElementById('loading').style.display = 'none';
        renderComparison();
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-state').style.display = '';
        document.getElementById('error-msg').textContent = err.message;
      }
    }

    // ── Init ──────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      const ids = getCurrentIds();
      if (ids.length === 0) {
        document.getElementById('empty-state').style.display = '';
      } else {
        loadProjects(ids);
      }
    });
  </script>
</body>
</html>
