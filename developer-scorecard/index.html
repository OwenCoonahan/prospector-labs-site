  html { background: hsl(var(--bg)); }
  body { font-family: 'Geist', system-ui, sans-serif; background: hsl(var(--bg)); color: hsl(0 0% 90%); }

  .score-bad { color: #ef4444; }
  .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 0.75rem; }
  input, select { background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); color: inherit; }
  input:focus, select:focus { outline: none; border-color: hsl(0 0% 40%); }
  .tab-active { border-bottom: 2px solid hsl(0 0% 90%); }
  .dark .tab-active { border-bottom-color: hsl(0 0% 90%); }
  html:not(.dark) .tab-active { border-bottom-color: hsl(0 0% 9%); }
  table th { text-align: left; font-weight: 500; color: hsl(var(--muted-fg)); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  table td { border-top: 1px solid hsl(var(--border)); }
  .fade-in { animation: fadeIn 0.15s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

<body class="min-h-screen">

<div id="app" class="max-w-7xl mx-auto px-6 py-8">
  <!-- Header -->
  <header class="flex items-center justify-between mb-8">
    <div>
      <div class="flex items-center gap-3 mb-1">
        <h1 class="text-lg font-semibold tracking-tight">Developer Reliability Score</h1>
        <span class="text-xs font-mono px-2 py-0.5 rounded" style="background:hsl(var(--muted));color:hsl(var(--muted-fg))">BETA</span>
      </div>

    </div>

      <span id="data-badge" class="text-xs font-mono px-2 py-0.5 rounded" style="background:hsl(var(--muted));color:hsl(var(--muted-fg))">LOADING</span>
      <span class="text-xs font-mono" style="color:hsl(var(--muted-fg))">Prospector Labs</span>

    <button onclick="switchTab('search')" id="tab-search" class="pb-3 text-sm font-medium" style="color:hsl(var(--muted-fg))">Search</button>
    <button onclick="switchTab('compare')" id="tab-compare" class="pb-3 text-sm font-medium" style="color:hsl(var(--muted-fg))">Compare</button>
    <button onclick="switchTab('scorecard')" id="tab-scorecard" class="pb-3 text-sm font-medium" style="color:hsl(var(--muted-fg))">Scorecard</button>
  </nav>

  <!-- Content -->
  <div id="content"></div>

<script src="data.js"></script>
<script>
// ── Config ──
const API_BASE = 'https://prospector-platform-production.up.railway.app';

// ── State ──
let currentTab = 'rankings';
let selectedDev = null;
let selectedDevId = null;
let compareList = [];
let sortCol = 'score';
let sortDir = 'desc';
let filterTier = '';
let filterState = '';
let filterMinProjects = 3;
let searchQuery = '';
let rankPage = 0;
const PAGE_SIZE = 50;

let useAPI = false;
let apiDevCache = new Map();    // id → enriched developer object
let staticDevs = [];            // normalized from data.js
let devCount = 0;
let projectCount = 0;
let loading = false;
let searchDebounce = null;

// API sort field mapping (API doesn't support 'score' sort)
const API_SORT_MAP = {
  score: 'total_projects',       // fallback — we re-sort client-side
  completion_rate: 'completion_rate',
  total_projects: 'total_projects',
  total_capacity_mw: 'total_capacity_mw',
  active_capacity_mw: 'active_capacity_mw',
  operational_capacity_mw: 'operational_capacity_mw',
};

// ── Scoring (client-side, mirrors data.js pre-computed scores) ──
function computeScore(d) {
  const cr = d.completion_rate ?? 0;
  const wr = d.withdrawal_rate ?? 0;
  const opMW = d.operational_capacity_mw ?? d.completed_capacity_mw ?? 0;
  const regions = d.region_count ?? (d.regions ? d.regions.split(',').length : 0);
  const tp = d.total_projects ?? 0;

  // Dimension scores (0-100)
  const s_completion = Math.min(cr * 100, 100);
  const s_withdrawal = Math.min((1 - wr) * 100, 100);
  const s_timeline = 50; // no timeline data from API — neutral default
  const s_capacity = opMW > 0 ? Math.min((Math.log10(opMW + 1) / Math.log10(10000)) * 100, 100) : 0;
  const s_regional = Math.min((regions / 5) * 100, 100);
  const s_experience = Math.min((tp / 50) * 100, 100);

  // Weighted score (0-1000)
  const raw = (s_completion * 0.30 + s_withdrawal * 0.20 + s_timeline * 0.20 +
               s_capacity * 0.15 + s_regional * 0.10 + s_experience * 0.05) * 10;
  const score = Math.round(Math.max(0, Math.min(1000, raw)));

  // Grade
  let grade;
  if (score >= 900) grade = 'A+';
  else if (score >= 800) grade = 'A';
  else if (score >= 750) grade = 'A-';
  else if (score >= 700) grade = 'B+';
  else if (score >= 650) grade = 'B';
  else if (score >= 600) grade = 'B-';
  else if (score >= 550) grade = 'C+';
  else if (score >= 500) grade = 'C';
  else if (score >= 450) grade = 'C-';
  else if (score >= 400) grade = 'D+';
  else if (score >= 350) grade = 'D';
  else if (score >= 300) grade = 'D-';
  else grade = 'F';

  // Confidence
  let confidence;
  if (tp >= 20) confidence = 'High';
  else if (tp >= 5) confidence = 'Medium';
  else confidence = 'Low';

  return {
    score, grade, confidence,
    s_completion_rate: s_completion,
    s_withdrawal_rate: s_withdrawal,
    s_timeline_adherence: s_timeline,
    s_capacity_delivered: s_capacity,
    s_regional_diversity: s_regional,
    s_experience_depth: s_experience,
  };
}

function enrichDev(d) {
  // Normalize API developer to match data.js shape
  const name = d.display_name || d.canonical_name || d.name || 'Unknown';
  const tp = d.total_projects ?? 0;
  const opMW = d.operational_capacity_mw ?? d.completed_capacity_mw ?? 0;
  const scores = computeScore(d);
  return {
    ...d,
    name: name,
    total_projects: tp,
    completed_projects: d.operational_projects ?? d.completed_projects ?? 0,
    active_projects: d.active_projects ?? 0,
    withdrawn_projects: d.withdrawn_projects ?? 0,
    total_capacity_mw: d.total_capacity_mw ?? 0,
    completed_capacity_mw: opMW,
    completion_rate: d.completion_rate ?? 0,
    withdrawal_rate: d.withdrawal_rate ?? 0,
    primary_region: d.primary_region || (d.regions ? (typeof d.regions === 'string' ? d.regions.split(',')[0] : '') : ''),
    primary_technology: d.primary_technology || '',
    regions: typeof d.regions === 'string' ? d.regions : (Array.isArray(d.regions) ? d.regions.join(',') : ''),
    states: typeof d.states === 'string' ? d.states : (Array.isArray(d.states) ? d.states.join(',') : ''),
    technologies: typeof d.technologies === 'string' ? d.technologies : (d.technology_mix ? (typeof d.technology_mix === 'string' ? d.technology_mix : '') : ''),
    needs_capital: d.needs_capital ?? false,
    parent_company: d.parent_company || '',
    tier: d.tier || 'unknown',
    ...scores,
  };
}

// ── Helpers ──
function scoreClass(s) {
  if (s >= 700) return 'score-excellent';
  if (s >= 600) return 'score-good';
  if (s >= 500) return 'score-fair';
  if (s >= 400) return 'score-poor';
  return 'score-bad';
}
function gradeColor(g) {
  if (g.startsWith('A')) return '#22c55e';
  if (g.startsWith('B')) return '#84cc16';
  if (g.startsWith('C')) return '#eab308';
  if (g.startsWith('D')) return '#f97316';
  return '#ef4444';
}
function fmt(n, d=0) { return n != null ? n.toLocaleString(undefined, {maximumFractionDigits:d}) : '—'; }
function pct(n) { return n != null ? (n * 100).toFixed(1) + '%' : '—'; }
function esc(s) { return (s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function tierLabel(t) {
  const map = { major_utility: 'Major Utility', major_ipp: 'Major IPP', mid_platform: 'Mid Platform', pe_fund: 'PE Fund', independent: 'Independent', unknown: 'Unknown' };
  return map[t] || t || '—';
}

function renderSkeleton(rows = 8) {
  let html = '<div class="card overflow-hidden"><table class="w-full text-sm"><tbody>';
  for (let i = 0; i < rows; i++) {
    html += `<tr><td class="px-3 py-3"><div class="skeleton" style="width:${30+Math.random()*60}%;height:14px"></div></td>
      <td class="px-3 py-3"><div class="skeleton" style="width:${40+Math.random()*40}%;height:14px"></div></td>
      <td class="px-3 py-3"><div class="skeleton" style="width:50%;height:14px"></div></td></tr>`;
  }
  return html + '</tbody></table></div>';
}

// ── Data source badge ──
function updateBadge() {
  const badge = document.getElementById('data-badge');
  const sub = document.getElementById('subtitle');
  if (useAPI) {
    badge.textContent = 'LIVE API';
    badge.style.background = '#166534';
    badge.style.color = '#4ade80';
    sub.textContent = `FICO-like scoring for energy project developers · ${fmt(devCount)} developers · Live data`;
  } else {
    badge.textContent = 'CACHED DATA';
    badge.style.background = '#78350f';
    badge.style.color = '#fbbf24';
    sub.textContent = `FICO-like scoring for energy project developers · ${fmt(devCount)} developers · ${fmt(projectCount)} projects`;
  }
}

// ── API fetching ──
async function apiFetch(path, params = {}) {
  const url = new URL(`${API_BASE}${path}`);
  Object.entries(params).forEach(([k, v]) => { if (v != null && v !== '') url.searchParams.set(k, v); });
  const resp = await fetch(url.toString(), { headers: { 'Accept': 'application/json' } });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  return resp.json();
}

async function fetchRankingsFromAPI(page, perPage, sort, order, filters) {
  const apiSort = API_SORT_MAP[sort] || 'total_projects';
  const params = { page: page + 1, per_page: perPage, sort: apiSort, order };
  if (filters.tier) params.tier = filters.tier;
  if (filters.state) params.state = filters.state;
  if (filters.min_projects) params.min_projects = filters.min_projects;
  if (filters.q) params.q = filters.q;
  const json = await apiFetch('/developers', params);
  const devs = (json.data || []).map(enrichDev);
  // If sorting by score (not natively supported), re-sort client-side
  if (sort === 'score' || sort === 'completion_rate') {
    devs.sort((a, b) => order === 'desc' ? b[sort] - a[sort] : a[sort] - b[sort]);
  }
  return { devs, total: json.meta?.total || devs.length, totalPages: json.meta?.total_pages || 1 };
}

async function fetchDevDetail(devId) {
  if (apiDevCache.has(devId)) return apiDevCache.get(devId);
  const json = await apiFetch(`/developers/${devId}`);
  const d = enrichDev(json.data || json);
  apiDevCache.set(devId, d);
  return d;
}

async function searchDevsAPI(query) {
  const json = await apiFetch('/developers', { q: query, per_page: 30 });
  return (json.data || []).map(enrichDev);
}

// ── Init ──
async function init() {
  const el = document.getElementById('content');
  el.innerHTML = renderSkeleton();

  // Try API first
  try {
    const json = await apiFetch('/developers', { per_page: 1 });
    if (json.data && json.meta) {
      useAPI = true;
      devCount = json.meta.total || 0;
      projectCount = 0; // not available from this endpoint
    }
  } catch (e) {
    useAPI = false;
  }

  // Fall back to static data.js
  if (!useAPI && typeof DEVELOPERS !== 'undefined') {
    staticDevs = DEVELOPERS;
    devCount = staticDevs.length;
    projectCount = staticDevs.reduce((s, d) => s + (d.total_projects || 0), 0);
  }

  updateBadge();

  // Check URL for ?q= search param
  const urlQ = new URLSearchParams(window.location.search).get('q');
  if (urlQ) {
    searchQuery = urlQ;
    currentTab = 'search';
  }

  render();
}

// ── Static data helpers (fallback mode) ──
function getStaticRegions() { return [...new Set(staticDevs.map(d => d.primary_region).filter(Boolean))].sort(); }
function getStaticTechs() { return [...new Set(staticDevs.map(d => d.primary_technology).filter(Boolean))].sort(); }

function filterStaticDevs() {
  return staticDevs.filter(d => {
    if (filterTier && d.tier !== filterTier) return false;
    if (filterState && !(d.states || '').includes(filterState) && d.headquarters_state !== filterState) return false;
    if (d.total_projects < filterMinProjects) return false;
    if (searchQuery && !(d.name || '').toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });
}

function sortStaticDevs(arr) {
  const dir = sortDir === 'desc' ? -1 : 1;
  return [...arr].sort((a, b) => {
    const av = a[sortCol] ?? 0, bv = b[sortCol] ?? 0;
    return av < bv ? dir : av > bv ? -dir : 0;
  });
}

// ── Filters bar ──
function filtersHtml() {
  const tiers = ['major_utility', 'major_ipp', 'mid_platform', 'pe_fund', 'independent'];
  return `
    <div class="flex flex-wrap gap-3 mb-5">
      <select onchange="filterTier=this.value;rankPage=0;render()" class="px-3 py-1.5 rounded-lg text-sm">
        <option value="">All Tiers</option>
        ${tiers.map(t => `<option value="${t}" ${t===filterTier?'selected':''}>${tierLabel(t)}</option>`).join('')}
      </select>
      <input type="text" placeholder="Filter by state..." value="${filterState}"
        oninput="filterState=this.value;rankPage=0;render()"
        class="px-3 py-1.5 rounded-lg text-sm w-32">
      <select onchange="filterMinProjects=+this.value;rankPage=0;render()" class="px-3 py-1.5 rounded-lg text-sm">
        <option value="1" ${filterMinProjects===1?'selected':''}>Min 1 project</option>
        <option value="3" ${filterMinProjects===3?'selected':''}>Min 3 projects</option>
        <option value="5" ${filterMinProjects===5?'selected':''}>Min 5 projects</option>
        <option value="10" ${filterMinProjects===10?'selected':''}>Min 10 projects</option>
        <option value="20" ${filterMinProjects===20?'selected':''}>Min 20 projects</option>
      </select>
    </div>`;
}

// ── Sort header ──
function sortHeader(col, label) {
  const arrow = sortCol === col ? (sortDir === 'desc' ? ' ↓' : ' ↑') : '';
  return `<th class="px-3 py-2 cursor-pointer select-none whitespace-nowrap" onclick="toggleSort('${col}')">${label}${arrow}</th>`;
}
function toggleSort(col) {
  if (sortCol === col) sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  else { sortCol = col; sortDir = 'desc'; }
  render();
}

// ── Rankings Tab ──
async function renderRankingsAsync() {
  const el = document.getElementById('content');

  if (useAPI) {
    el.innerHTML = filtersHtml() + renderSkeleton();
    try {
      const filters = { tier: filterTier, state: filterState, min_projects: filterMinProjects > 1 ? filterMinProjects : null };
      const { devs, total, totalPages } = await fetchRankingsFromAPI(rankPage, PAGE_SIZE, sortCol, sortDir, filters);
      el.innerHTML = filtersHtml() + renderRankingsTable(devs, total, totalPages);
    } catch (e) {
      // Fall back to static
      useAPI = false;
      updateBadge();
      renderRankingsStatic();
    }
  } else {
    renderRankingsStatic();
  }
}

function renderRankingsStatic() {
  const filtered = sortStaticDevs(filterStaticDevs());
  const page = filtered.slice(rankPage * PAGE_SIZE, (rankPage + 1) * PAGE_SIZE);
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  document.getElementById('content').innerHTML = filtersHtml() + renderRankingsTable(page, filtered.length, totalPages);
}

function renderRankingsTable(devs, total, totalPages) {
  return `
    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr>
              <th class="px-3 py-2 w-8">#</th>
              <th class="px-3 py-2">Developer</th>
              ${sortHeader('score', 'Score')}
              <th class="px-3 py-2">Grade</th>
              ${sortHeader('completion_rate', 'Completion')}
              <th class="px-3 py-2">Tier</th>
              ${sortHeader('total_projects', 'Projects')}
              ${sortHeader('total_capacity_mw', 'Total MW')}
              <th class="px-3 py-2">Tech</th>
              <th class="px-3 py-2">Confidence</th>
            </tr>
          </thead>
          <tbody>
            ${devs.map((d, i) => `
              <tr class="hover:bg-[hsl(var(--muted))] cursor-pointer transition-colors" onclick="viewDev('${esc(d.name)}', ${d.id || 'null'})">
                <td class="px-3 py-2.5 font-mono text-xs" style="color:hsl(var(--muted-fg))">${rankPage * PAGE_SIZE + i + 1}</td>
                <td class="px-3 py-2.5 font-medium">${d.name}${d.parent_company ? `<span class="text-xs ml-1" style="color:hsl(var(--muted-fg))">· ${d.parent_company}</span>` : ''}</td>
                <td class="px-3 py-2.5 font-mono font-semibold ${scoreClass(d.score)}">${d.score}</td>
                <td class="px-3 py-2.5 font-mono" style="color:${gradeColor(d.grade)}">${d.grade}</td>
                <td class="px-3 py-2.5 font-mono">${pct(d.completion_rate)}</td>
                <td class="px-3 py-2.5 text-xs">${tierLabel(d.tier)}</td>
                <td class="px-3 py-2.5 font-mono">${d.total_projects}</td>
                <td class="px-3 py-2.5 font-mono">${fmt(d.total_capacity_mw, 0)}</td>
                <td class="px-3 py-2.5 text-xs">${d.primary_technology || '—'}</td>
                <td class="px-3 py-2.5 text-xs">${d.confidence}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      <div class="flex items-center justify-between px-4 py-3 border-t" style="border-color:hsl(var(--border))">
        <span class="text-xs" style="color:hsl(var(--muted-fg))">${fmt(total)} developers</span>
        <div class="flex gap-2">
          <button onclick="rankPage=Math.max(0,rankPage-1);render()" class="px-3 py-1 text-xs rounded-lg" style="background:hsl(var(--muted))" ${rankPage===0?'disabled':''}>← Prev</button>
          <span class="text-xs font-mono py-1" style="color:hsl(var(--muted-fg))">${rankPage+1}/${totalPages || 1}</span>
          <button onclick="rankPage=Math.min(${(totalPages||1)-1},rankPage+1);render()" class="px-3 py-1 text-xs rounded-lg" style="background:hsl(var(--muted))" ${rankPage>=(totalPages||1)-1?'disabled':''}>Next →</button>
        </div>
      </div>
    </div>`;
}

// ── Search Tab ──
let searchResults = [];
let searchLoading = false;

async function renderSearchAsync() {
  const el = document.getElementById('content');

  const inputHtml = `
    <div class="mb-5">
      <input type="text" placeholder="Search developer name..." value="${searchQuery}"
        oninput="handleSearchInput(this.value)"
        class="w-full max-w-lg px-4 py-2.5 rounded-lg text-sm" autofocus>
    </div>
    ${filtersHtml()}`;

  if (!searchQuery) {
    el.innerHTML = inputHtml + '<p class="text-sm" style="color:hsl(var(--muted-fg))">Start typing to search developers.</p>';
    return;
  }

  if (useAPI) {
    el.innerHTML = inputHtml + '<div class="grid gap-3">' + renderSkeleton(4) + '</div>';
    try {
      searchResults = await searchDevsAPI(searchQuery);
      el.innerHTML = inputHtml + renderSearchResults(searchResults);
    } catch (e) {
      useAPI = false;
      updateBadge();
      renderSearchStatic();
    }
  } else {
    renderSearchStatic();
  }
}

function renderSearchStatic() {
  const el = document.getElementById('content');
  searchResults = searchQuery ? sortStaticDevs(filterStaticDevs()).slice(0, 30) : [];
  const inputHtml = `
    <div class="mb-5">
      <input type="text" placeholder="Search developer name..." value="${searchQuery}"
        oninput="handleSearchInput(this.value)"
        class="w-full max-w-lg px-4 py-2.5 rounded-lg text-sm" autofocus>
    </div>
    ${filtersHtml()}`;
  el.innerHTML = inputHtml + renderSearchResults(searchResults);
}

function renderSearchResults(results) {
  if (!results.length) return '<p class="text-sm" style="color:hsl(var(--muted-fg))">No results found.</p>';
  return `<div class="grid gap-3">
    ${results.map(d => `
      <div class="card px-5 py-4 flex items-center justify-between cursor-pointer hover:bg-[hsl(var(--muted))] transition-colors" onclick="viewDev('${esc(d.name)}', ${d.id || 'null'})">
        <div>
          <div class="font-medium">${d.name}</div>
          <div class="text-xs mt-1" style="color:hsl(var(--muted-fg))">${tierLabel(d.tier)} · ${d.primary_technology || '—'} · ${d.total_projects} projects${d.needs_capital ? ' · <span style="color:#22c55e">Seeking Capital</span>' : ''}</div>
        </div>
        <div class="text-right">
          <div class="font-mono text-2xl font-semibold ${scoreClass(d.score)}">${d.score}</div>
          <div class="font-mono text-xs" style="color:${gradeColor(d.grade)}">${d.grade} · ${d.confidence}</div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

function handleSearchInput(val) {
  searchQuery = val;
  // Update URL
  const url = new URL(window.location);
  if (val) url.searchParams.set('q', val);
  else url.searchParams.delete('q');
  history.replaceState(null, '', url);

  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => render(), useAPI ? 300 : 100);
}

// ── Scorecard Tab ──
async function renderScorecardAsync() {
  const el = document.getElementById('content');
  if (!selectedDev) {
    el.innerHTML = '<p class="text-sm" style="color:hsl(var(--muted-fg))">Select a developer from Rankings or Search to view their scorecard.</p>';
    return;
  }

  el.innerHTML = renderSkeleton(6);

  let d = null;

  // Try API detail first
  if (useAPI && selectedDevId) {
    try {
      d = await fetchDevDetail(selectedDevId);
    } catch (e) { /* fall through */ }
  }

  // Fall back to static data or cached search results
  if (!d) {
    d = staticDevs.find(x => x.name === selectedDev) || searchResults.find(x => x.name === selectedDev);
  }

  if (!d) {
    el.innerHTML = '<p class="text-sm" style="color:hsl(var(--muted-fg))">Developer not found. Try searching again.</p>';
    return;
  }

  const dims = [
    { name: 'Completion Rate', weight: 30, score: d.s_completion_rate, raw: pct(d.completion_rate), desc: `${pct(d.completion_rate)} of projects reached COD` },
    { name: 'Withdrawal Rate', weight: 20, score: d.s_withdrawal_rate, raw: pct(d.withdrawal_rate), desc: `${pct(d.withdrawal_rate)} of projects withdrawn (lower is better)` },
    { name: 'Timeline Adherence', weight: 20, score: d.s_timeline_adherence, raw: d.avg_timeline_months ? d.avg_timeline_months.toFixed(0) + ' mo' : 'N/A', desc: d.avg_timeline_months ? `Avg ${d.avg_timeline_months.toFixed(0)} months queue-to-COD` : 'Insufficient data' },
    { name: 'Capacity Delivered', weight: 15, score: d.s_capacity_delivered, raw: fmt(d.completed_capacity_mw, 0) + ' MW', desc: `${fmt(d.completed_capacity_mw, 0)} MW brought online` },
    { name: 'Regional Diversity', weight: 10, score: d.s_regional_diversity, raw: (d.region_count || (d.regions ? d.regions.split(',').length : 0)) + ' regions', desc: `Active in ${d.region_count || (d.regions ? d.regions.split(',').length : 0)} ISO regions` },
    { name: 'Experience Depth', weight: 5, score: d.s_experience_depth, raw: (d.years_active||0) + ' yrs / ' + d.total_projects + ' proj', desc: `${d.years_active||'—'} years active, ${d.total_projects} projects` },
  ];

  const rList = d.regions ? d.regions.split(',').filter(Boolean) : [];
  const tList = d.technologies ? d.technologies.split(',').filter(Boolean) : (d.primary_technology ? [d.primary_technology] : []);
  const sList = d.states ? d.states.split(',').filter(Boolean) : (d.headquarters_state ? [d.headquarters_state] : []);

  el.innerHTML = `
    <button onclick="selectedDev=null;selectedDevId=null;switchTab('rankings')" class="text-xs mb-4 px-3 py-1 rounded-lg" style="background:hsl(var(--muted));color:hsl(var(--muted-fg))">← Back to Rankings</button>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Score hero -->
      <div class="card p-8 flex flex-col items-center justify-center">
        <div class="font-mono text-6xl font-bold ${scoreClass(d.score)}">${d.score}</div>
        <div class="font-mono text-lg mt-1" style="color:${gradeColor(d.grade)}">${d.grade}</div>
        <div class="text-xs mt-2" style="color:hsl(var(--muted-fg))">Confidence: ${d.confidence}</div>
        <div class="text-sm font-medium mt-4">${d.name}</div>
        <div class="text-xs mt-1" style="color:hsl(var(--muted-fg))">${tierLabel(d.tier)}${d.parent_company ? ' · ' + d.parent_company : ''}</div>
        <div class="text-xs mt-1" style="color:hsl(var(--muted-fg))">${d.primary_technology || '—'}${d.headquarters_state ? ' · HQ: ' + d.headquarters_state : ''}</div>
        ${d.needs_capital ? '<div class="text-xs mt-2 px-2 py-0.5 rounded" style="background:#166534;color:#4ade80">Seeking Capital</div>' : ''}
      </div>

      <!-- Radar chart -->
      <div class="card p-6">
        <h3 class="text-xs font-medium mb-4" style="color:hsl(var(--muted-fg))">SCORE DIMENSIONS</h3>
        <canvas id="radar-canvas" width="300" height="300"></canvas>
      </div>

      <!-- Key stats -->
      <div class="card p-6">
        <h3 class="text-xs font-medium mb-4" style="color:hsl(var(--muted-fg))">KEY METRICS</h3>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Total Projects</span><span class="font-mono">${d.total_projects}</span></div>
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Completed</span><span class="font-mono">${d.completed_projects}</span></div>
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Active</span><span class="font-mono">${d.active_projects}</span></div>
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Withdrawn</span><span class="font-mono">${d.withdrawn_projects}</span></div>
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Total Capacity</span><span class="font-mono">${fmt(d.total_capacity_mw, 0)} MW</span></div>
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Online Capacity</span><span class="font-mono">${fmt(d.completed_capacity_mw, 0)} MW</span></div>
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Avg Project Size</span><span class="font-mono">${d.avg_project_size_mw ? fmt(d.avg_project_size_mw, 1) + ' MW' : '—'}</span></div>
          <div class="flex justify-between"><span style="color:hsl(var(--muted-fg))">Years Active</span><span class="font-mono">${d.years_active || '—'}</span></div>
        </div>
      </div>
    </div>

    <!-- Score breakdown -->
    <div class="card p-6 mt-6">
      <h3 class="text-xs font-medium mb-4" style="color:hsl(var(--muted-fg))">SCORE BREAKDOWN</h3>
      <div class="space-y-4">
        ${dims.map(dim => `
          <div>
            <div class="flex justify-between text-sm mb-1">
              <span>${dim.name} <span class="font-mono text-xs" style="color:hsl(var(--muted-fg))">(${dim.weight}%)</span></span>
              <span class="font-mono">${dim.score.toFixed(0)}/100 · ${dim.raw}</span>
            </div>
            <div class="w-full h-1.5 rounded-full" style="background:hsl(var(--muted))">
              <div class="h-full rounded-full transition-all" style="width:${dim.score}%;background:${dim.score>=70?'#22c55e':dim.score>=50?'#eab308':'#ef4444'}"></div>
            </div>
            <div class="text-xs mt-0.5" style="color:hsl(var(--muted-fg))">${dim.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Geography & Tech -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
      <div class="card p-6">
        <h3 class="text-xs font-medium mb-3" style="color:hsl(var(--muted-fg))">REGIONS</h3>
        <div class="flex flex-wrap gap-1.5">${rList.length ? rList.map(r => `<span class="px-2 py-0.5 rounded text-xs font-mono" style="background:hsl(var(--muted))">${r}</span>`).join('') : '<span class="text-xs" style="color:hsl(var(--muted-fg))">—</span>'}</div>
      </div>
      <div class="card p-6">
        <h3 class="text-xs font-medium mb-3" style="color:hsl(var(--muted-fg))">TECHNOLOGIES</h3>
        <div class="flex flex-wrap gap-1.5">${tList.length ? tList.map(t => `<span class="px-2 py-0.5 rounded text-xs font-mono" style="background:hsl(var(--muted))">${t}</span>`).join('') : '<span class="text-xs" style="color:hsl(var(--muted-fg))">—</span>'}</div>
      </div>
      <div class="card p-6">
        <h3 class="text-xs font-medium mb-3" style="color:hsl(var(--muted-fg))">STATES</h3>
        <div class="flex flex-wrap gap-1.5">${sList.length ? sList.slice(0,15).map(s => `<span class="px-2 py-0.5 rounded text-xs font-mono" style="background:hsl(var(--muted))">${s}</span>`).join('') + (sList.length>15?`<span class="text-xs" style="color:hsl(var(--muted-fg))">+${sList.length-15} more</span>`:'') : '<span class="text-xs" style="color:hsl(var(--muted-fg))">—</span>'}</div>
      </div>
    </div>
  `;

  setTimeout(() => drawRadar('radar-canvas', dims), 50);
}

// ── Compare Tab ──
function renderCompare() {
  // Compare uses cached data from search/rankings — works in both modes
  const allDevs = useAPI ? [...apiDevCache.values()] : staticDevs;
  const searchRes = searchQuery ? allDevs.filter(d => (d.name||'').toLowerCase().includes(searchQuery.toLowerCase())).slice(0, 10) : [];
  const selected = allDevs.filter(d => compareList.includes(d.name));

  if (selected.length >= 2) {
    const dims = ['s_completion_rate', 's_withdrawal_rate', 's_timeline_adherence', 's_capacity_delivered', 's_regional_diversity', 's_experience_depth'];
    const dimNames = ['Completion', 'Withdrawal', 'Timeline', 'Capacity', 'Regional', 'Experience'];
    const colors = ['#22c55e', '#3b82f6', '#eab308', '#f97316', '#a855f7'];
    setTimeout(() => drawCompareRadar('compare-radar', selected, dimNames, dims, colors), 50);
  }

  return `
    <div class="mb-5">
      <input type="text" placeholder="Search to add developers (select 2-5)..." value="${searchQuery}"
        oninput="searchQuery=this.value;render()"
        class="w-full max-w-lg px-4 py-2.5 rounded-lg text-sm">
    </div>
    ${searchRes.length && searchQuery ? `
      <div class="card mb-5 max-w-lg overflow-hidden">
        ${searchRes.map(d => `
          <div class="px-4 py-2 flex items-center justify-between hover:bg-[hsl(var(--muted))] cursor-pointer text-sm" onclick="addCompare('${esc(d.name)}')">
            <span>${d.name}</span>
            <span class="font-mono ${scoreClass(d.score)}">${d.score}</span>
          </div>
        `).join('')}
      </div>
    ` : (searchQuery && useAPI ? '<p class="text-xs mb-4" style="color:hsl(var(--muted-fg))">Compare works with developers you\'ve already viewed. Search or browse Rankings first to populate the cache.</p>' : '')}
    ${compareList.length ? `
      <div class="flex gap-2 mb-5 flex-wrap">
        ${compareList.map((n, i) => `
          <span class="px-3 py-1 rounded-lg text-xs font-medium flex items-center gap-2" style="background:hsl(var(--muted))">
            ${n}
            <button onclick="removeCompare(${i})" class="hover:text-red-400">×</button>
          </span>
        `).join('')}
        <button onclick="compareList=[];render()" class="px-3 py-1 rounded-lg text-xs" style="color:hsl(var(--muted-fg))">Clear all</button>
      </div>
    ` : ''}
    ${selected.length >= 2 ? `
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="card p-6">
          <h3 class="text-xs font-medium mb-4" style="color:hsl(var(--muted-fg))">RADAR COMPARISON</h3>
          <canvas id="compare-radar" width="400" height="400"></canvas>
        </div>
        <div class="card p-6">
          <h3 class="text-xs font-medium mb-4" style="color:hsl(var(--muted-fg))">SCORE COMPARISON</h3>
          <div class="space-y-4">
            ${selected.map((d, i) => `
              <div class="flex items-center gap-4">
                <div class="w-3 h-3 rounded-full" style="background:${['#22c55e','#3b82f6','#eab308','#f97316','#a855f7'][i]}"></div>
                <div class="flex-1">
                  <div class="text-sm font-medium">${d.name}</div>
                  <div class="text-xs" style="color:hsl(var(--muted-fg))">${tierLabel(d.tier)} · ${d.primary_technology||'—'}</div>
                </div>
                <div class="font-mono text-2xl font-bold ${scoreClass(d.score)}">${d.score}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      <div class="card overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr>
            <th class="px-4 py-3">Metric</th>
            ${selected.map(d => `<th class="px-4 py-3">${d.name}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${[
              ['Score', d => `<span class="font-mono font-bold ${scoreClass(d.score)}">${d.score}</span>`],
              ['Grade', d => `<span class="font-mono" style="color:${gradeColor(d.grade)}">${d.grade}</span>`],
              ['Tier', d => `<span>${tierLabel(d.tier)}</span>`],
              ['Completion Rate', d => `<span class="font-mono">${pct(d.completion_rate)}</span>`],
              ['Withdrawal Rate', d => `<span class="font-mono">${pct(d.withdrawal_rate)}</span>`],
              ['Total Projects', d => `<span class="font-mono">${d.total_projects}</span>`],
              ['Completed', d => `<span class="font-mono">${d.completed_projects}</span>`],
              ['Total MW', d => `<span class="font-mono">${fmt(d.total_capacity_mw,0)}</span>`],
              ['MW Online', d => `<span class="font-mono">${fmt(d.completed_capacity_mw,0)}</span>`],
              ['Regions', d => `<span class="font-mono">${d.region_count || (d.regions?d.regions.split(',').length:0)}</span>`],
              ['Confidence', d => `<span>${d.confidence}</span>`],
            ].map(([label, fn]) => `
              <tr>
                <td class="px-4 py-2.5" style="color:hsl(var(--muted-fg))">${label}</td>
                ${selected.map(d => `<td class="px-4 py-2.5">${fn(d)}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    ` : '<p class="text-sm" style="color:hsl(var(--muted-fg))">Select at least 2 developers to compare.${useAPI ? ' Browse Rankings or Search first to populate developer cache.' : ''}</p>'}
  `;
}

function addCompare(name) {
  if (!compareList.includes(name) && compareList.length < 5) {
    compareList.push(name);
    searchQuery = '';
    render();
  }
}
function removeCompare(i) { compareList.splice(i, 1); render(); }

// ── Charts ──
let radarChart = null;
let compareChart = null;

function drawRadar(canvasId, dims) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (radarChart) radarChart.destroy();
  const isDark = document.documentElement.classList.contains('dark');
  radarChart = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: dims.map(d => d.name),
      datasets: [{
        data: dims.map(d => d.score),
        backgroundColor: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)',
        borderColor: isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.6)',
        pointBackgroundColor: isDark ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.8)',
        borderWidth: 1.5,
        pointRadius: 3,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          beginAtZero: true, max: 100,
          ticks: { display: false },
          grid: { color: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)' },
          angleLines: { color: isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)' },
          pointLabels: { color: isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.5)', font: { size: 11, family: 'Geist' } },
        }
      }
    }
  });
}

function drawCompareRadar(canvasId, devs, dimNames, dimKeys, colors) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (compareChart) compareChart.destroy();
  const isDark = document.documentElement.classList.contains('dark');
  compareChart = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: dimNames,
      datasets: devs.map((d, i) => ({
        label: d.name,
        data: dimKeys.map(k => d[k]),
        backgroundColor: colors[i] + '15',
        borderColor: colors[i],
        pointBackgroundColor: colors[i],
        borderWidth: 1.5,
        pointRadius: 3,
      }))
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: isDark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.6)', font: { size: 11, family: 'Geist' } } } },
      scales: {
        r: {
          beginAtZero: true, max: 100,
          ticks: { display: false },
          grid: { color: isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)' },
          angleLines: { color: isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)' },
          pointLabels: { color: isDark?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.5)', font: { size: 11, family: 'Geist' } },
        }
      }
    }
  });
}

// ── Navigation ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('nav button').forEach(b => {
    b.classList.remove('tab-active');
    b.style.color = 'hsl(var(--muted-fg))';
  });
  const btn = document.getElementById('tab-' + tab);
  btn.classList.add('tab-active');
  btn.style.color = '';
  render();
}

function viewDev(name, id) {
  selectedDev = name;
  selectedDevId = id;
  switchTab('scorecard');
}

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  render();
}

// ── Render ──
function render() {
  const el = document.getElementById('content');
  switch (currentTab) {
    case 'rankings': renderRankingsAsync(); break;
    case 'search': renderSearchAsync(); break;
    case 'scorecard': renderScorecardAsync(); break;
    case 'compare': el.innerHTML = renderCompare(); break;
  }
}

init();
</script>
