<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investable Projects | Prospector Labs</title>
<style>
  :root[data-theme="dark"] {
    --bg: #09090b; --surface: #18181b; --surface-2: #27272a;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.15);
    --text: #fafafa; --text-2: #a1a1aa; --text-3: #71717a;
    --accent: #3b82f6; --accent-hover: #2563eb;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444;
    --score-a-bg: rgba(34,197,94,0.12); --score-a-fg: #4ade80;
    --score-b-bg: rgba(59,130,246,0.12); --score-b-fg: #93c5fd;
    --score-c-bg: rgba(234,179,8,0.12); --score-c-fg: #fde047;
    --badge-ec-bg: rgba(34,197,94,0.12); --badge-ec-fg: #4ade80;
    --badge-li-bg: rgba(168,85,247,0.12); --badge-li-fg: #c084fc;
    --badge-stage-bg: rgba(59,130,246,0.1); --badge-stage-fg: #93c5fd;
    --shadow: 0 1px 2px rgba(0,0,0,0.3);
    --toggle-icon: "&#9790;";
  }
  :root[data-theme="light"] {
    --bg: #fafafa; --surface: #ffffff; --surface-2: #f4f4f5;
    --border: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.15);
    --text: #18181b; --text-2: #52525b; --text-3: #a1a1aa;
    --accent: #2563eb; --accent-hover: #1d4ed8;
    --green: #16a34a; --yellow: #ca8a04; --red: #dc2626;
    --score-a-bg: rgba(22,163,74,0.08); --score-a-fg: #15803d;
    --score-b-bg: rgba(37,99,235,0.08); --score-b-fg: #1d4ed8;
    --score-c-bg: rgba(202,138,4,0.08); --score-c-fg: #a16207;
    --badge-ec-bg: rgba(22,163,74,0.08); --badge-ec-fg: #15803d;
    --badge-li-bg: rgba(147,51,234,0.08); --badge-li-fg: #7c3aed;
    --badge-stage-bg: rgba(37,99,235,0.06); --badge-stage-fg: #1d4ed8;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --toggle-icon: "&#9728;";
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    padding: 24px; max-width: 1400px; margin: 0 auto;
    line-height: 1.5; transition: background 0.2s, color 0.2s;
  }

  /* Header */
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .subtitle { color: var(--text-3); font-size: 0.8rem; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .theme-toggle {
    background: none; border: 1px solid var(--border); color: var(--text-2);
    width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; transition: border-color 0.15s;
  }
  .theme-toggle:hover { border-color: var(--border-hover); }
  .refresh-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    font-size: 0.8rem; font-weight: 500; transition: background 0.15s;
  }
  .refresh-btn:hover { background: var(--accent-hover); }
  .last-updated { color: var(--text-3); font-size: 0.7rem; }

  /* KPIs */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .kpi {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; box-shadow: var(--shadow);
  }
  .kpi .label { color: var(--text-3); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .kpi .value { font-size: 1.6rem; font-weight: 700; margin-top: 2px; letter-spacing: -0.02em; }
  .kpi .value.green { color: var(--green); }
  .kpi .value.accent { color: var(--accent); }
  .kpi .value.yellow { color: var(--yellow); }

  /* Breakdowns */
  .breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .breakdown-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; box-shadow: var(--shadow);
  }
  .breakdown-card h3 { color: var(--text-3); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; font-weight: 500; }
  .breakdown-item { display: flex; justify-content: space-between; font-size: 0.78rem; padding: 2px 0; }
  .breakdown-item .count { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* Filters */
  .filters {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 3px; }
  .filter-group label { color: var(--text-3); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .filters select, .filters input[type="number"] {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; border-radius: 6px; font-size: 0.8rem;
    transition: border-color 0.15s; outline: none;
  }
  .filters select { min-width: 110px; }
  .filters input[type="number"] { width: 72px; }
  .filters select:focus, .filters input:focus { border-color: var(--accent); }
  .apply-btn {
    background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
    transition: border-color 0.15s;
  }
  .apply-btn:hover { border-color: var(--border-hover); }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; background: var(--surface); }
  th {
    background: var(--surface-2); color: var(--text-3);
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 10px 12px; text-align: left; white-space: nowrap;
    font-weight: 500; border-bottom: 1px solid var(--border);
  }
  td {
    padding: 9px 12px; border-top: 1px solid var(--border);
    font-size: 0.82rem; white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  tr:hover td { background: var(--surface-2); }

  .score {
    display: inline-block; min-width: 28px; text-align: center;
    padding: 2px 6px; border-radius: 5px; font-weight: 600; font-size: 0.78rem;
  }
  .score.a { background: var(--score-a-bg); color: var(--score-a-fg); }
  .score.b { background: var(--score-b-bg); color: var(--score-b-fg); }
  .score.c { background: var(--score-c-bg); color: var(--score-c-fg); }

  .badge {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 0.65rem; font-weight: 500; letter-spacing: 0.02em;
  }
  .badge.ec { background: var(--badge-ec-bg); color: var(--badge-ec-fg); }
  .badge.li { background: var(--badge-li-bg); color: var(--badge-li-fg); }
  .badge.stage { background: var(--badge-stage-bg); color: var(--badge-stage-fg); }

  .dev-name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
  .project-name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
  .cod-stale { color: var(--red); }

  /* Pagination */
  .pagination { display: flex; gap: 8px; margin-top: 14px; justify-content: center; align-items: center; }
  .pagination button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;
    transition: border-color 0.15s;
  }
  .pagination button:disabled { opacity: 0.3; cursor: default; }
  .pagination button:hover:not(:disabled) { border-color: var(--accent); }
  .pagination span { color: var(--text-3); font-size: 0.8rem; }

  .loading { text-align: center; padding: 32px; color: var(--text-3); font-size: 0.85rem; }
  .error { background: rgba(239,68,68,0.1); color: var(--red); padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 0.82rem; border: 1px solid rgba(239,68,68,0.15); }

  @media (max-width: 768px) {
    body { padding: 14px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .breakdown { grid-template-columns: 1fr; }
    table { font-size: 0.75rem; }
    td, th { padding: 6px 8px; }
    .project-name { max-width: 140px; }
    .dev-name { max-width: 120px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Investable Projects</h1>
    <div class="subtitle">ITC-eligible projects from independent developers near completion</div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated"></span>
    <button class="refresh-btn" onclick="loadAll()">Refresh</button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
  </div>
</div>

<div id="error" class="error" style="display:none"></div>

<div class="kpi-row" id="kpis">
  <div class="kpi"><div class="label">Investable</div><div class="value green" id="kpiTotal">--</div></div>
  <div class="kpi"><div class="label">Total MW</div><div class="value accent" id="kpiMW">--</div></div>
  <div class="kpi"><div class="label">Avg Score</div><div class="value yellow" id="kpiScore">--</div></div>
  <div class="kpi"><div class="label">Est. Credit Value</div><div class="value green" id="kpiValue">--</div></div>
</div>

<div class="breakdown" id="breakdowns">
  <div class="breakdown-card"><h3>By Stage</h3><div id="byStage">--</div></div>
  <div class="breakdown-card"><h3>By Type</h3><div id="byType">--</div></div>
  <div class="breakdown-card"><h3>Top States</h3><div id="byState">--</div></div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>State</label>
    <select id="fState"><option value="">All</option></select>
  </div>
  <div class="filter-group">
    <label>Stage</label>
    <select id="fStage">
      <option value="">All</option>
      <option value="construction">Construction</option>
      <option value="late">Late</option>
      <option value="mid">Mid</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Type</label>
    <select id="fType">
      <option value="">All</option>
      <option value="Solar">Solar</option>
      <option value="Battery">Battery</option>
      <option value="Solar+Storage">Solar+Storage</option>
      <option value="Hybrid">Hybrid</option>
      <option value="Wind">Wind</option>
    </select>
  </div>
  <div class="filter-group">
    <label>Min MW</label>
    <input type="number" id="fMinMW" step="0.5" placeholder="0.5">
  </div>
  <div class="filter-group">
    <label>Max MW</label>
    <input type="number" id="fMaxMW" step="1" placeholder="10">
  </div>
  <div class="filter-group">
    <label>Min Score</label>
    <input type="number" id="fMinScore" step="5" placeholder="55">
  </div>
  <button class="apply-btn" onclick="loadProjects(1)">Apply</button>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th>Score</th>
      <th>Project</th>
      <th>MW</th>
      <th>State</th>
      <th>Stage</th>
      <th>Developer</th>
      <th>ITC</th>
      <th>Bonuses</th>
      <th>COD</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr><td colspan="9" class="loading">Loading...</td></tr>
  </tbody>
</table>
</div>

<div class="pagination">
  <button id="prevBtn" onclick="prevPage()" disabled>&larr; Prev</button>
  <span id="pageInfo">Page 1</span>
  <button id="nextBtn" onclick="nextPage()">Next &rarr;</button>
</div>

<script>
const API = 'https://prospector-platform-production.up.railway.app';
let currentPage = 1;
const perPage = 50;

// Theme
function getTheme() {
  const stored = localStorage.getItem('prospector-theme');
  if (stored) return stored;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeToggle').innerHTML = t === 'dark' ? '&#9728;' : '&#9790;';
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('prospector-theme', next);
  applyTheme(next);
}
applyTheme(getTheme());

// Formatters
function fmt(n) { return n != null ? Number(n).toLocaleString() : '--'; }
function fmtM(n) { return n != null ? '$' + (n/1e6).toFixed(1) + 'M' : '--'; }
function pct(n) { return n != null ? (n * 100).toFixed(0) + '%' : '--'; }
function scoreClass(s) { return s >= 80 ? 'a' : s >= 65 ? 'b' : 'c'; }

// Escape HTML to prevent XSS from project names
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadSummary() {
  try {
    const r = await fetch(`${API}/investable/summary`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const { data } = await r.json();

    document.getElementById('kpiTotal').textContent = fmt(data.total_investable);
    document.getElementById('kpiMW').textContent = fmt(data.total_mw);
    document.getElementById('kpiScore').textContent = data.avg_score || '--';
    document.getElementById('kpiValue').textContent = fmtM(data.total_credit_value);

    const mkBreakdown = (obj) => Object.entries(obj || {}).map(([k, v]) =>
      `<div class="breakdown-item"><span>${esc(k)}</span><span class="count">${fmt(v.count || v)}</span></div>`
    ).join('');

    document.getElementById('byStage').innerHTML = mkBreakdown(data.by_stage) || '--';
    document.getElementById('byType').innerHTML = mkBreakdown(data.by_type) || '--';
    document.getElementById('byState').innerHTML = Object.entries(data.by_state || {}).slice(0, 8).map(([k, v]) =>
      `<div class="breakdown-item"><span>${esc(k)}</span><span class="count">${fmt(v.count)}</span></div>`
    ).join('') || '--';

    const sel = document.getElementById('fState');
    if (sel.options.length <= 1) {
      Object.keys(data.by_state || {}).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        sel.appendChild(opt);
      });
    }
    document.getElementById('error').style.display = 'none';
  } catch (e) {
    document.getElementById('error').textContent = `Failed to load summary: ${e.message}`;
    document.getElementById('error').style.display = 'block';
  }
}

async function loadProjects(page) {
  currentPage = page || 1;
  const params = new URLSearchParams();
  params.set('page', currentPage);
  params.set('per_page', perPage);
  params.set('sort', 'investability_score');
  params.set('order', 'desc');

  const filters = {
    state: 'fState', construction_stage: 'fStage', type: 'fType',
    min_mw: 'fMinMW', max_mw: 'fMaxMW', min_score: 'fMinScore',
  };
  for (const [param, id] of Object.entries(filters)) {
    const val = document.getElementById(id).value;
    if (val) params.set(param, val);
  }

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="9" class="loading">Loading...</td></tr>';

  try {
    const r = await fetch(`${API}/investable?${params}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const { data, meta } = await r.json();

    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="loading">No projects match filters</td></tr>';
      document.getElementById('pageInfo').textContent = '0 results';
      return;
    }

    tbody.innerHTML = data.map(p => {
      const bonuses = [];
      if (p.energy_community_eligible) bonuses.push('<span class="badge ec">EC</span>');
      if (p.low_income_eligible) bonuses.push('<span class="badge li">LI</span>');
      const score = p.investability_score || 0;
      const rate = pct(p.itc_rate || p.effective_credit_rate);
      const cod = p.cod_std || '?';
      return `<tr>
        <td><span class="score ${scoreClass(score)}">${score}</span></td>
        <td class="project-name" title="${esc(p.name)}">${esc(p.name) || '?'}</td>
        <td>${p.capacity_mw ? p.capacity_mw.toFixed(1) : '?'}</td>
        <td>${esc(p.state) || '?'}</td>
        <td><span class="badge stage">${esc(p.construction_stage) || '?'}</span></td>
        <td class="dev-name" title="${esc(p.developer_canonical)}">${esc(p.developer_canonical) || '?'}</td>
        <td>${rate}</td>
        <td>${bonuses.join(' ') || '-'}</td>
        <td>${esc(cod)}</td>
      </tr>`;
    }).join('');

    const totalPages = meta.total_pages || 1;
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages} (${fmt(meta.total)})`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    document.getElementById('error').style.display = 'none';
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="9" class="loading">Error: ${e.message}</td></tr>`;
  }
}

function prevPage() { if (currentPage > 1) loadProjects(currentPage - 1); }
function nextPage() { loadProjects(currentPage + 1); }

function loadAll() {
  document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
  loadSummary();
  loadProjects(1);
}

loadAll();
</script>

</body>
</html>
